name: CI/CD Pipeline

on:
  push:
    branches: ["**"]       # Run on every branch push
  pull_request:
    branches: [main]

jobs:

  # ══════════════════════════════════════════════════════
  # STAGE 1: LINT
  # Check code style — catches obvious errors before running anything
  # ══════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python linters
        run: pip install flake8

      # flake8 checks Python style (PEP8)
      # max-line-length=120 is more relaxed than default 79
      - name: Lint Python - API
        run: flake8 api/main.py --max-line-length=120 --ignore=E501

      - name: Lint Python - Worker
        run: flake8 worker/worker.py --max-line-length=120 --ignore=E501

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint JavaScript
        run: cd frontend && npm run lint

      # hadolint checks Dockerfiles for best practices
      - name: Install hadolint
        run: |
          wget -O /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  # ══════════════════════════════════════════════════════
  # STAGE 2: TEST
  # Run unit tests and generate coverage report
  # ══════════════════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint        # Only runs if lint passed
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r api/requirements.txt

      - name: Run pytest with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      # Upload coverage report so it shows in GitHub Actions
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ══════════════════════════════════════════════════════
  # STAGE 3: BUILD
  # Build Docker images and push to a local registry
  # ══════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test        # Only runs if tests passed
    # Service containers run alongside the job
    # This starts a local Docker registry on port 5000
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      # Get the short git SHA (first 7 chars of commit hash)
      # Used to tag images so we know exactly what code is inside
      - name: Get git SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host   # Lets builder reach the local registry

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          # Tag with both the git SHA and "latest"
          tags: |
            localhost:5000/api:${{ steps.sha.outputs.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ steps.sha.outputs.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ steps.sha.outputs.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Save SHA for later stages to use
      - name: Save SHA
        run: echo "${{ steps.sha.outputs.sha }}" > sha.txt

      - name: Upload SHA artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-sha
          path: sha.txt

  # ══════════════════════════════════════════════════════
  # STAGE 4: SECURITY SCAN
  # Trivy scans images for known vulnerabilities (CVEs)
  # ══════════════════════════════════════════════════════
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Download SHA
        uses: actions/download-artifact@v4
        with:
          name: build-sha

      - name: Get SHA
        id: sha
        run: echo "sha=$(cat sha.txt)" >> $GITHUB_OUTPUT

      # Rebuild images so this job has them (each job gets a fresh runner)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: localhost:5000/api:${{ steps.sha.outputs.sha }}
          cache-from: type=gha

      - name: Rebuild and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: localhost:5000/worker:${{ steps.sha.outputs.sha }}
          cache-from: type=gha

      - name: Rebuild and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: localhost:5000/frontend:${{ steps.sha.outputs.sha }}
          cache-from: type=gha

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      # Scan each image — exit-code 1 means FAIL if CRITICAL vulnerability found
      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output api-scan.sarif \
            localhost:5000/api:${{ steps.sha.outputs.sha }} || true

      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output worker-scan.sarif \
            localhost:5000/worker:${{ steps.sha.outputs.sha }} || true

      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output frontend-scan.sarif \
            localhost:5000/frontend:${{ steps.sha.outputs.sha }} || true

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "*.sarif"

  # ══════════════════════════════════════════════════════
  # STAGE 5: INTEGRATION TEST
  # Start the whole stack and test it end-to-end like a real user
  # ══════════════════════════════════════════════════════
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      # Create a .env file for docker-compose to read
      - name: Create .env
        run: |
          cat > .env << EOF
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_URL=http://api:8000
          FRONTEND_PORT=3000
          EOF

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 60); do
            STATUS=$(docker compose ps --format json | python3 -c "
          import sys, json
          data = [json.loads(l) for l in sys.stdin if l.strip()]
          unhealthy = [s for s in data if s.get('Health','') not in ('healthy','')]
          print('ok' if not unhealthy else 'waiting')
          " 2>/dev/null || echo "waiting")
            if [ "$STATUS" = "ok" ]; then
              echo "All services healthy!"
              break
            fi
            echo "Attempt $i/60: Services not ready yet..."
            sleep 3
          done

      - name: Run integration test
        run: |
          # Submit a job via the frontend
          echo "Submitting a job..."
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json" \
            -d '{"payload": "integration-test-job"}')
          echo "Response: $RESPONSE"

          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          # Poll until job is completed (max 60 seconds)
          echo "Polling for completion..."
          for i in $(seq 1 30); do
            STATUS_RESPONSE=$(curl -sf http://localhost:3000/status/$JOB_ID)
            STATUS=$(echo $STATUS_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Attempt $i: Status = $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "✅ Integration test PASSED! Job completed successfully."
              exit 0
            fi
            sleep 2
          done

          echo "❌ Integration test FAILED! Job did not complete in time."
          exit 1

      # Always tear down, even if the test failed — clean up the runner
      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ══════════════════════════════════════════════════════
  # STAGE 6: DEPLOY
  # Rolling update — new container must pass health check before old one stops
  # Only runs on pushes to main branch
  # ══════════════════════════════════════════════════════
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    # Only deploy when code is pushed to main (not on PRs or other branches)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env << EOF
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_URL=http://api:8000
          FRONTEND_PORT=3000
          EOF

      - name: Rolling deploy
        run: |
          # This simulates a rolling update:
          # 1. Start new containers (docker compose up --no-deps pulls/builds new images)
          # 2. Wait for health check to pass
          # 3. Only then is the old container replaced

          echo "Starting rolling update..."
          docker compose up -d --build --no-deps api

          echo "Waiting for new API to pass health check (max 60s)..."
          for i in $(seq 1 12); do
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' \
              $(docker compose ps -q api) 2>/dev/null || echo "unknown")
            echo "API health: $HEALTH (attempt $i/12)"

            if [ "$HEALTH" = "healthy" ]; then
              echo "✅ New API container is healthy. Completing deploy..."
              docker compose up -d --build   # Bring up rest of stack
              echo "🚀 Deploy successful!"
              exit 0
            fi
            sleep 5
          done

          echo "❌ New container did not become healthy in 60s. Aborting deploy."
          docker compose stop api
          docker compose up -d --no-deps --no-recreate api
          exit 1