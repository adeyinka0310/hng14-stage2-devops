# Named network — all services join this network and can talk to each other by name
networks:
  app-network:
    driver: bridge

services:

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # BUG FIX: No ports exposed — Redis should NEVER be open to the host machine
    networks:
      - app-network
    # HEALTHCHECK: ping Redis to confirm it's ready before other services start
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── API ────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    networks:
      - app-network
    environment:
      # All config comes from env vars — nothing hardcoded!
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    # depends_on with condition: service_healthy means Docker waits until
    # Redis passes its healthcheck BEFORE starting the API
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # ── Worker ─────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    networks:
      - app-network
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - app-network
    ports:
      # Only the frontend is exposed to your browser — port 3000 on your machine
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_URL: ${API_URL:-http://api:8000}
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M